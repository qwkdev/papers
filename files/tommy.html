<body>
    <div id="x">
        <p id="cps">67 CPS</p>
    </div>

    <script>
        let clicks = 0;
        let start = 0;

        let wait = null;
        const x = document.getElementById('x');
        x.addEventListener('click', function() {
            if (wait === null) restart();

            clicks++;
            update();
            clearTimeout(wait);
            wait = setTimeout(function() { wait = null; restart(); }, 1000);
        });

        function round(n, p) {
            const f = Math.pow(10, p);
            return Math.round(n * f) / f;
        }

        function restart() {
            start = performance.now();
            clicks = 0;
            update();
        }
        const c = document.getElementById('cps');
        function update() {
            if (clicks) c.innerText = `CPS: ${round(clicks / ((performance.now() - start) / 1000), 2)}`;
            else c.innerText = 'CPS: Waiting';
        }

        // setInterval(update, 1000);
    </script>
