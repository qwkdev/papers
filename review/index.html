<body>
	<div id="main">
		<h1>Review</h1>
		<div id="review">
			<textarea id="text" maxlength="90" placeholder="Write a review..."></textarea>
			<input type="text" maxlength="15" id="name" placeholder="Name" />
			<div id="stars">
				<!-- Idk how else to do ts vro -->
				<!-- &#9734; | &#9733; -->
				<p id="star1" onclick="rate(1)">☆</p>
				<p id="star2" onclick="rate(2)">☆</p>
				<p id="star3" onclick="rate(3)">☆</p>
				<p id="star4" onclick="rate(4)">☆</p>
				<p id="star5" onclick="rate(5)">☆</p>
			</div>
		</div>
		<button id="submit" class="grey" onclick="submit()">Submit</button>
	<script>

		function rate(n) {
			for (let i = 1; i <= 5; i++) {
				document.getElementById('star' + i).innerHTML = (i <= n) ? '★' : '☆';
			}
		}

		const textInput = document.getElementById("text");
		const nameInput = document.getElementById("name");
		
		function check() {
			if (
				textInput.value.length > 0 &&
				nameInput.value.length > 0 &&
				['star1', 'star2', 'star3', 'star4', 'star5'].some(star => document.getElementById(star).innerHTML == '★')
			) {
				document.getElementById("submit").classList.remove("grey");
			} else {
				document.getElementById("submit").classList.add("grey");
			}
		}

		textInput.addEventListener('input', check);
		nameInput.addEventListener('input', check);
		document.getElementById("stars").addEventListener('click', check);

		function submit() {
			const text = textInput.value;
			const name = nameInput.value;
			const rating = [...Array(5).keys()].map(i => document.getElementById('star' + (i + 1)).innerHTML == '★' ? 1 : 0).reduce((a, b) => a + b, 0);

			if (text.length > 0 && name.length > 0 && rating > 0) {
				window.location.href = `https://qwk.pythonanywhere.com/contact/send?msg=${encodeURIComponent(text)}&name=${encodeURIComponent(name)}&ref=SQA-Review&rating=${rating}&after=${encodeURIComponent('Thanks,<br>Your review will be checked by us, and then added to the site.')}`;
			}
		}

		// fetch('https://qwk.pythonanywhere.com/l/sqa-review', { method: 'GET' });
	</script>
